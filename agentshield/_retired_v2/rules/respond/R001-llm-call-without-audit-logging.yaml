rules:
  - id: agentshield.respond.llm-call-without-audit-logging
    languages: [python]
    severity: INFO
    message: >-
      LLM/agent invocation in this module without surrounding logger / callback /
      tracer setup. Without an audit trail you can't reconstruct what the agent
      saw, decided, or did — blocking incident response and post-hoc red-team
      analysis. AgentShield Framework v1 (AS-R-001).
    patterns:
      - pattern-either:
          # Generic LLM/agent/chain verbs — these match SMARTSDK
          # (runner.run/run_stream/run_async), LangChain (chain.invoke),
          # LlamaIndex (qe.query), etc.
          #
          # Note on awaited calls: semgrep matches sub-expressions, so
          # `$X.run(...)` ALSO matches `await $X.run(...)` — the inner
          # call expression is reachable inside the await wrapper. Earlier
          # versions added explicit `await $X.<verb>(...)` patterns; those
          # were removed because they produced DUPLICATE findings (one for
          # the inner match, one for the outer await match) at the same
          # call site. The unawaited generics alone cover both sync and
          # awaited code. Validated against the SMARTSDK Lambda
          # regression testbed (testbed/smartsdk-lambda).
          - pattern: $X.invoke(...)
          - pattern: $X.ainvoke(...)
          - pattern: $X.run(...)
          - pattern: $X.run_stream(...)
          - pattern: $X.run_async(...)
          - pattern: $X.predict(...)
          - pattern: $X.generate(...)
          - pattern: $X.query(...)
          - pattern: $X.chat(...)
          # SMARTSDK / RADSDK embedding invocations
          - pattern: $MODEL.embed(...)
          - pattern: $MODEL.aembed(...)
      # Filter known false positives — same as DF001.
      - pattern-not: asyncio.run(...)
      - pattern-not: threading.Thread(...).run(...)
      - pattern-not: subprocess.run(...)
      - pattern-not: re.compile(...).run(...)
      # boto3 Lambda invocation — `$CLIENT.invoke(FunctionName=..., ...)` is
      # the canonical boto3.client("lambda").invoke shape, NOT an LLM call.
      # Phase E judge surfaced this on a SMART SDK Lambda doing async
      # self-invocation. The required FunctionName= keyword is a strong
      # disambiguator from the LLM SDK invoke() shape.
      - pattern-not: $X.invoke(FunctionName=$FN, ...)
      - pattern-not: boto3.client("lambda").invoke(...)
      # Structured-audit imports — historically the only acceptors. Plain
      # `import logging` was excluded because it's used everywhere for
      # error handling. Phase E relaxed that: `logger = logging.getLogger(...)`
      # is explicit logger-instance setup (stronger than mere `import logging`)
      # and counts as audit-logging intent when paired with actual logger.*
      # calls in the file. Pragmatic Python idiom.
      - pattern-not-inside: |
          import structlog
          ...
      - pattern-not-inside: |
          from langchain.callbacks import $Y
          ...
      - pattern-not-inside: |
          from langchain_core.callbacks import $Y
          ...
      - pattern-not-inside: |
          from langsmith import $Y
          ...
      - pattern-not-inside: |
          from opentelemetry import $Y
          ...
      - pattern-not-inside: |
          callbacks=$CB
          ...
      # stdlib logger setup — the canonical Python audit pattern (Phase E).
      - pattern-not-inside: |
          $LOGGER = logging.getLogger(...)
          ...
      - pattern-not-inside: |
          $LOGGER = getLogger(...)
          ...
    metadata:
      category: respond
      agentshield_id: AS-R-001
      severity_normalized: medium
      framework_mappings:
        owasp_llm: ["LLM10"]
        owasp_agentic: ["T8"]
        nist_ai_rmf: ["MEASURE-2.7", "MANAGE-3.1"]
        mitre_atlas: ["AML.T0024"]
        agentshield_v1: ["AS-R-001"]
      languages: [python]
      remediation: >-
        Add structured logging around every LLM/agent invocation. Capture: input
        prompt, retrieved documents, tool calls made, model output, latency, token
        counts. Recommended: LangSmith or OpenTelemetry traces with the LangChain
        OTEL integration. At minimum: standard `logging` with a dedicated
        `agent_audit` logger writing JSON.
      references:
        - "https://genai.owasp.org/llmrisk/llm10-unbounded-consumption/"
        - "https://docs.smith.langchain.com/"
