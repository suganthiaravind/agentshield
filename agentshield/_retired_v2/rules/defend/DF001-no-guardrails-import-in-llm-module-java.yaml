rules:
  - id: agentshield.defend.no-guardrails-import-in-llm-module-java
    languages: [java]
    severity: WARNING
    message: >-
      This module invokes an LLM/agent (SMARTSDK runner, langchain4j model)
      but does not import any known guardrails / input-sanitization library
      (Lakera Guard Java SDK, OWASP Java Encoder, Apache Commons Text escaping)
      and does not wire a Spring AI advisor (.advisors / .defaultAdvisors).
      Java guardrail ecosystem is sparser than Python — calibrate severity per
      repo. Java port of agentshield.defend.no-guardrails-import-in-llm-module.
    patterns:
      - pattern-either:
          # SMARTSDK Java (wraps Google ADK) — explicit two-arg signature
          # so we don't collide with java.util.concurrent.Executor.run() etc.
          - pattern: $RUNNER.runStream($AGENT, ...)
          - pattern: $RUNNER.run($AGENT, $INPUT, ...)
          - pattern: $RUNNER.runAsync($AGENT, ...)
          # langchain4j
          - pattern: $MODEL.generate(...)
          - pattern: $MODEL.chat(...)
          - pattern: $ASSISTANT.chat(...)
          # Spring AI
          - pattern: $CLIENT.prompt().user(...).call(...)
          - pattern: $MODEL.call(new Prompt(...))
          - pattern: $MODEL.stream(new Prompt(...))
          # AWS Bedrock Runtime (direct SDK)
          - pattern: $CLIENT.invokeModel(...)
          - pattern: $CLIENT.invokeModelWithResponseStream(...)
          - pattern: $CLIENT.converse(...)
          - pattern: $CLIENT.converseStream(...)
          # Azure OpenAI Java SDK
          - pattern: $CLIENT.getChatCompletions(...)
          - pattern: $CLIENT.getCompletions(...)
          # Embeddings
          - pattern: $MODEL.embed(...)
          - pattern: $EMBEDDING.embedAll(...)
          - pattern: $CLIENT.getEmbeddings(...)
      # Over-broad catch-alls dropped (Phase E judge feedback): $AGENT.run(...),
      # $AGENT.invoke(...), $CHAIN.execute(...) collided with SpringApplication.run,
      # CompletableFuture.runAsync, taskExecutor.execute, etc. — net negative.
      - pattern-not: SpringApplication.run(...)
      - pattern-not: org.springframework.boot.SpringApplication.run(...)
      # Async / executor framework calls — these are not LLM invocations.
      - pattern-not: CompletableFuture.runAsync(...)
      - pattern-not: CompletableFuture.supplyAsync(...)
      - pattern-not: java.util.concurrent.CompletableFuture.runAsync(...)
      - pattern-not: java.util.concurrent.CompletableFuture.supplyAsync(...)
      - pattern-not-inside: |
          import com.lakera.$X;
          ...
      - pattern-not-inside: |
          import org.owasp.encoder.$X;
          ...
      - pattern-not-inside: |
          import org.apache.commons.text.StringEscapeUtils;
          ...
      - pattern-not-inside: |
          import org.springframework.ai.chat.client.advisor.$X;
          ...
      - pattern-not-inside: |
          import org.springframework.ai.moderation.$X;
          ...
      # Spring AI advisor wiring — inline on the prompt chain.
      - pattern-not: $CLIENT.prompt().advisors(...).user(...).call(...)
      - pattern-not: $CLIENT.prompt().user(...).advisors(...).call(...)
      # In-house advisor / guardrail / scrubber classes — recognize any
      # import whose class name ends in Advisor, Guardrail, Scrubber, or
      # Sanitizer as guardrail intent. Covers JPMC ScrubbingCallAdvisor
      # and similar custom CallAdvisor subclasses outside org.springframework.ai.
      - pattern-not-inside:
          patterns:
            - pattern-inside: |
                import $PKG.$CLS;
                ...
            - metavariable-regex:
                metavariable: $CLS
                regex: '.*(Advisor|Guardrail|Scrubber|Sanitizer)$'
    metadata:
      category: defend
      agentshield_id: AS-DF-001
      severity_normalized: medium
      framework_mappings:
        owasp_llm: ["LLM01", "LLM05"]
        owasp_agentic: ["T6"]
        nist_ai_rmf: ["MAP-2.3", "MANAGE-2.4"]
        mitre_atlas: []
        agentshield_v1: []
      languages: [java]
      remediation: >-
        Add an input/output guardrail layer. For Java, options include:
        Lakera Guard Java SDK (com.lakera), OWASP Java Encoder
        (org.owasp.encoder), Apache Commons Text (StringEscapeUtils), or wire a
        Spring AI advisor via .advisors(...) / .defaultAdvisors(...) (built-in
        or in-house CallAdvisor subclass). Choose at least one input filter
        (prompt-injection detector) and one output filter (PII / toxic content).
      references:
        - "https://genai.owasp.org/llmrisk/llm01-prompt-injection/"
