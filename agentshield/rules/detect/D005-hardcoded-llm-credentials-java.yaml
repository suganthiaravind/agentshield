rules:
  - id: agentshield.detect.hardcoded-llm-credentials-java
    languages: [java]
    severity: ERROR
    message: >-
      Hardcoded credential string passed to a Java LLM client constructor or
      builder (langchain4j, Spring AI, Azure OpenAI, AWS Bedrock direct).
      Secrets in source code are CWE-798 — they end up in git history, jar
      manifests, container images, and CI logs. Use a secrets manager (AWS
      Secrets Manager, HashiCorp Vault, Azure Key Vault), Spring's
      `@Value("${env.var}")`, or the SDK's default credential resolver
      instead. Java port of agentshield.detect.hardcoded-llm-credentials.
    pattern-either:
      # Builder API (langchain4j, Spring AI, SMARTSDK Java) — match the
      # `.apiKey("literal")` / `.token("literal")` step as a sub-expression.
      # semgrep Java doesn't support `...` between method-chain links, so
      # we match the credential-binding step directly and rely on semgrep's
      # sub-expression matching to find it inside any fluent chain.
      - pattern: $X.apiKey("...")
      - pattern: $X.token("...")
      - pattern: $X.secretKey("...")
      # Azure OpenAI Java SDK
      - pattern: new AzureKeyCredential("...")
      - pattern: new com.azure.core.credential.AzureKeyCredential("...")
      # AWS Bedrock Runtime (Java SDK v2) — static credentials with literals
      - pattern: AwsBasicCredentials.create("...", "...")
      - pattern: software.amazon.awssdk.auth.credentials.AwsBasicCredentials.create("...", "...")
      - pattern: AwsSessionCredentials.create("...", "...", "...")
      # AWS SDK v1 (still in some prod codebases)
      - pattern: new BasicAWSCredentials("...", "...")
      - pattern: new com.amazonaws.auth.BasicAWSCredentials("...", "...")
      # Spring AI OpenAI / Anthropic / Mistral API constructors taking the key directly
      - pattern: new OpenAiApi("...", ...)
      - pattern: new org.springframework.ai.openai.api.OpenAiApi("...", ...)
      - pattern: new AnthropicApi("...", ...)
      - pattern: new MistralAiApi("...", ...)
    metadata:
      category: detect
      agentshield_id: AS-S-D-CWE_798-001
      legacy_ids: ["AS-D-005"]
      severity_normalized: critical
      framework_mappings:
        # Curated to >=75% coverage. Dropped T3 (operational
        # privilege), AML.T0012 (valid-account use). AML.T0055
        # in-app subset stays — broker/vault misconfig is infra
        # layer, not app code.
        owasp_llm: ["LLM02"]
        owasp_agentic: []
        nist_ai_rmf: ["MANAGE-2.4"]
        mitre_atlas: ["AML.T0055"]
        cwe: ["CWE-798"]
        agentshield_v1: []
      languages: [java]
      remediation: >-
        Move the credential out of source. Options, ranked by safety:
        (1) the SDK's default credential resolver — for AWS Bedrock, use
        DefaultCredentialsProvider.create() and rely on the IAM role / instance
        profile / env vars; for Azure, use DefaultAzureCredential().
        (2) Spring `@Value("${OPENAI_API_KEY}")` or `@Value("${app.api-key}")`
        wired from environment / config server.
        (3) A secrets manager looked up at startup (AWS Secrets Manager, HashiCorp
        Vault, Azure Key Vault). Rotate any credential that has been committed —
        git history exposes it forever even after deletion from HEAD.
      references:
        - "https://cwe.mitre.org/data/definitions/798.html"
        - "https://genai.owasp.org/llmrisk/llm02-sensitive-information-disclosure/"
