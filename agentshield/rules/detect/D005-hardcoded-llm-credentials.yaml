rules:
  - id: agentshield.detect.hardcoded-llm-credentials
    languages: [python]
    severity: ERROR
    message: >-
      Hardcoded credential string passed to an LLM client constructor (OpenAI,
      Anthropic, Cohere, Mistral, Together, Groq, HuggingFace, Google
      generative AI, AWS Bedrock). Secrets in source code are CWE-798 (Use of
      Hard-coded Credentials) — they end up in git history, container images,
      and CI logs. Use environment variables, a secrets manager (AWS Secrets
      Manager, HashiCorp Vault, Azure Key Vault), or the SDK's default
      credential resolver instead.
    pattern-either:
      # OpenAI Python SDK (sync + async)
      - pattern: openai.OpenAI(api_key="...", ...)
      - pattern: openai.AsyncOpenAI(api_key="...", ...)
      - pattern: OpenAI(api_key="...", ...)
      - pattern: AsyncOpenAI(api_key="...", ...)
      # Anthropic Python SDK
      - pattern: anthropic.Anthropic(api_key="...", ...)
      - pattern: anthropic.AsyncAnthropic(api_key="...", ...)
      - pattern: Anthropic(api_key="...", ...)
      - pattern: AsyncAnthropic(api_key="...", ...)
      # Cohere — first positional arg is the API key historically
      - pattern: cohere.Client("...", ...)
      - pattern: cohere.ClientV2("...", ...)
      - pattern: cohere.AsyncClient("...", ...)
      - pattern: cohere.Client(api_key="...", ...)
      - pattern: cohere.ClientV2(api_key="...", ...)
      # Mistral
      - pattern: MistralClient(api_key="...", ...)
      - pattern: Mistral(api_key="...", ...)
      # Together
      - pattern: Together(api_key="...", ...)
      - pattern: together.Together(api_key="...", ...)
      # Groq
      - pattern: Groq(api_key="...", ...)
      - pattern: groq.Groq(api_key="...", ...)
      - pattern: AsyncGroq(api_key="...", ...)
      # HuggingFace inference
      - pattern: InferenceClient(token="...", ...)
      - pattern: AsyncInferenceClient(token="...", ...)
      - pattern: huggingface_hub.login(token="...", ...)
      # Google generative AI
      - pattern: genai.configure(api_key="...", ...)
      - pattern: google.generativeai.configure(api_key="...", ...)
      # AWS Bedrock direct (boto3) — long-lived access keys in source
      - pattern: boto3.client("bedrock-runtime", ..., aws_access_key_id="...", ...)
      - pattern: boto3.client("bedrock-runtime", ..., aws_secret_access_key="...", ...)
      - pattern: boto3.Session(..., aws_access_key_id="...", ...)
      - pattern: boto3.Session(..., aws_secret_access_key="...", ...)
      # Azure OpenAI
      - pattern: AzureOpenAI(api_key="...", ...)
      - pattern: AsyncAzureOpenAI(api_key="...", ...)
      # LangChain wrappers (forward to the underlying SDK; same surface)
      - pattern: ChatOpenAI(openai_api_key="...", ...)
      - pattern: ChatOpenAI(api_key="...", ...)
      - pattern: ChatAnthropic(anthropic_api_key="...", ...)
      - pattern: ChatAnthropic(api_key="...", ...)
      - pattern: ChatCohere(cohere_api_key="...", ...)
      - pattern: ChatCohere(api_key="...", ...)
    metadata:
      category: detect
      agentshield_id: AS-S-D-CWE_798-001
      legacy_ids: ["AS-D-005"]
      severity_normalized: critical
      framework_mappings:
        owasp_llm: ["LLM02", "LLM03"]
        owasp_agentic: ["T3"]
        nist_ai_rmf: ["MANAGE-2.4"]
        mitre_atlas: ["AML.T0012"]
        cwe: ["CWE-798"]
        agentshield_v1: []
      languages: [python]
      remediation: >-
        Move the credential out of source. Options, ranked by safety: (1) the
        SDK's default credential resolver — for OpenAI / Anthropic / Cohere /
        Mistral, omit `api_key=` and the SDK reads the standard env var
        (OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.); for boto3, omit
        aws_access_key_id and let the default chain (IAM role, instance
        profile, env, ~/.aws/credentials) resolve. (2) A secrets manager
        looked up at startup (AWS Secrets Manager, HashiCorp Vault, Azure Key
        Vault) — `api_key=secrets.get_secret_value(...)["SecretString"]`.
        (3) Environment variable read explicitly — `api_key=os.environ["OPENAI_API_KEY"]`.
        Rotate any credential that has been committed to git (it must be
        treated as compromised — git history exposes it forever even if you
        delete it from HEAD).
      references:
        - "https://cwe.mitre.org/data/definitions/798.html"
        - "https://genai.owasp.org/llmrisk/llm02-sensitive-information-disclosure/"
