rules:
  - id: agentshield.detect.system-prompt-leak-via-tool-output
    languages: [python]
    severity: ERROR
    message: >-
      A code path exposes the agent's system prompt (or any variable
      named like a prompt template) in a user-reachable response —
      typically an error handler that includes the active prompt for
      "debugging". The prompt itself often carries secrets (escalation
      keys, internal IDs, tool descriptions) and is by definition
      meant to stay opaque to the user. Pair with a runtime probe that
      requests the prompt explicitly to confirm the model accepts the
      extraction request (MITRE ATLAS AML.T0056 — System Prompt
      Disclosure; OWASP LLM07 — System Prompt Leakage).
    patterns:
      - pattern-either:
          # Returning the prompt in a Flask/FastAPI/Starlette response.
          # Patterns are quoted because the `"key": $VAR` inside the
          # dict literal would otherwise look like a YAML mapping key.
          - pattern: 'jsonify({..., "active_system_prompt": $PROMPT, ...})'
          - pattern: 'jsonify({..., "system_prompt": $PROMPT, ...})'
          - pattern: 'jsonify({..., "prompt_template": $PROMPT, ...})'
          - pattern: 'jsonify({..., "prompt": $PROMPT, ...})'
          - pattern: 'return {"...": ..., "system_prompt": $PROMPT, ...}'
          - pattern: 'Response(json.dumps({..., "system_prompt": $PROMPT, ...}), ...)'
          # Echoing the prompt into a logged error or message.
          - pattern: 'logging.error(f"... {$PROMPT_VAR} ...", ...)'
          - pattern: 'logging.exception(f"... {$PROMPT_VAR} ...", ...)'
          # Re-raising with the prompt embedded.
          - pattern: 'raise Exception(f"... {SYSTEM_PROMPT} ...")'
          - pattern: 'raise ValueError(f"... {SYSTEM_PROMPT} ...")'
    metadata:
      category: detect
      agentshield_id: AS-S-D-LLM07-002
      legacy_ids: []
      severity_normalized: high
      framework_mappings:
        # Curated to >=75% coverage. Dropped T8 (rule catches data
        # leakage via output, not lack of audit/traceability; ~45%).
        # AML.T0056 stays — system-prompt-disclosure surface is a
        # direct match. Runtime probe pair confirms behaviour.
        owasp_llm: ["LLM07"]
        owasp_agentic: []
        nist_ai_rmf: ["MAP-2.3", "MEASURE-2.10"]
        mitre_atlas: ["AML.T0056"]
        cwe: ["CWE-200"]  # Information Exposure
        agentshield_v1: []
      languages: [python]
      remediation: >-
        Never include the system prompt in user-visible responses or
        logs. Redact prompt-shaped variables from error responses (return
        a generic error code, log the prompt separately to a non-user-
        reachable destination). If you must surface debugging context to
        operators, gate it behind authenticated /admin routes and never
        on the user-facing endpoint. Treat the system prompt as a secret:
        rotate the embedded keys if it has ever leaked.
      references:
        - "https://atlas.mitre.org/techniques/AML.T0056/"
        - "https://genai.owasp.org/llmrisk/llm07-system-prompt-leakage/"
