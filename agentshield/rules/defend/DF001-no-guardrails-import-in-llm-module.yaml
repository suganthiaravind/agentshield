rules:
  - id: agentshield.defend.no-guardrails-import-in-llm-module
    languages: [python]
    severity: WARNING
    message: >-
      This module invokes an LLM/agent/chain but does not import any known
      guardrails library (NeMo Guardrails, Lakera, Rebuff, Llama Guard, Presidio,
      Guardrails-AI). High-risk modules should layer at least one input or output
      filter. Absence-detection — calibrate severity per repo.
    patterns:
      - pattern-either:
          # Generic LLM/agent/chain verbs — these match SMARTSDK
          # (runner.run/run_stream/run_async), LangChain (chain.invoke),
          # LlamaIndex (qe.query), Bedrock (client.converse), etc.
          #
          # Note on awaited calls: semgrep matches sub-expressions, so
          # `$X.run(...)` ALSO matches `await $X.run(...)` — the inner
          # call expression is reachable inside the await wrapper. Earlier
          # versions of these rules added explicit `await $X.<verb>(...)`
          # patterns; those were removed because they produced DUPLICATE
          # findings (one for the inner match, one for the outer await
          # match) at the same call site. The unawaited generics alone
          # cover both sync and awaited code. Validated against the
          # SMARTSDK Lambda regression testbed (testbed/smartsdk-lambda).
          - pattern: $X.invoke(...)
          - pattern: $X.ainvoke(...)
          - pattern: $X.run(...)
          - pattern: $X.run_stream(...)
          - pattern: $X.run_async(...)
          - pattern: $X.predict(...)
          - pattern: $X.generate(...)
          - pattern: $X.query(...)
          - pattern: $X.chat(...)
          # SMARTSDK / RADSDK embedding invocations
          - pattern: $MODEL.embed(...)
          - pattern: $MODEL.aembed(...)
      # Filter known false positives — generic $X.run(...) and $X.invoke(...)
      # match too broadly. asyncio.run is the most common offender (it's used
      # to bridge sync/async even in legit SMARTSDK code).
      - pattern-not: asyncio.run(...)
      - pattern-not: threading.Thread(...).run(...)
      - pattern-not: subprocess.run(...)
      - pattern-not: re.compile(...).run(...)
      - pattern-not-inside: |
          import nemoguardrails
          ...
      - pattern-not-inside: |
          from nemoguardrails import $Y
          ...
      - pattern-not-inside: |
          import lakera_chainguard
          ...
      - pattern-not-inside: |
          from lakera_chainguard import $Y
          ...
      - pattern-not-inside: |
          import rebuff
          ...
      - pattern-not-inside: |
          from rebuff import $Y
          ...
      - pattern-not-inside: |
          import guardrails
          ...
      - pattern-not-inside: |
          from guardrails import $Y
          ...
      - pattern-not-inside: |
          import presidio_analyzer
          ...
      - pattern-not-inside: |
          from presidio_analyzer import $Y
          ...
      - pattern-not-inside: |
          from llama_guard import $Y
          ...
    metadata:
      category: defend
      agentshield_id: AS-DF-001
      severity_normalized: medium
      framework_mappings:
        owasp_llm: ["LLM01", "LLM05"]
        owasp_agentic: ["T6"]
        nist_ai_rmf: ["MAP-2.3", "MANAGE-2.4"]
        mitre_atlas: []
        agentshield_v1: []
      languages: [python]
      remediation: >-
        Add an input/output guardrail layer. Suggested OSS options:
        NeMo Guardrails (https://github.com/NVIDIA/NeMo-Guardrails),
        Llama Guard (Meta), Lakera Chainguard, Rebuff, Guardrails-AI.
        Choose at least one input filter (prompt-injection detector) and one output
        filter (PII / toxic content). For RAG, add a separate retrieval filter.
      references:
        - "https://genai.owasp.org/llmrisk/llm01-prompt-injection/"
