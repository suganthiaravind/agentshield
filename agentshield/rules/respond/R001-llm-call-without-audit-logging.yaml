rules:
  - id: agentshield.respond.llm-call-without-audit-logging
    languages: [python]
    severity: INFO
    message: >-
      LLM/agent invocation in this module without surrounding logger / callback /
      tracer setup. Without an audit trail you can't reconstruct what the agent
      saw, decided, or did — blocking incident response and post-hoc red-team
      analysis. AgentShield Framework v1 (AS-R-001).
    patterns:
      - pattern-either:
          - pattern: $X.invoke(...)
          - pattern: $X.ainvoke(...)
          - pattern: $X.run(...)
          - pattern: $X.predict(...)
          - pattern: $X.generate(...)
          - pattern: $X.query(...)
          - pattern: $X.chat(...)
          # SMARTSDK (wraps Google ADK)
          - pattern: $RUNNER.run_stream($AGENT, ...)
          - pattern: $RUNNER.run_async($AGENT, ...)
          - pattern: $RUNNER.run($AGENT, ...)
          - pattern: Console($RUNNER.run_stream($AGENT, ...))
          - pattern: Console($RUNNER.run_async($AGENT, ...))
          # SMARTSDK awaited variants — semgrep treats `await expr` as a
          # distinct AST node. Without these, awaited runner calls (the
          # standard SMARTSDK shape) silently don't match.
          - pattern: await $RUNNER.run($AGENT, ...)
          - pattern: await $RUNNER.run_stream($AGENT, ...)
          - pattern: await $RUNNER.run_async($AGENT, ...)
          # SMARTSDK / RADSDK embedding invocations
          - pattern: $MODEL.embed(...)
          - pattern: $MODEL.aembed(...)
      # Filter known false positives — same as DF001.
      - pattern-not: asyncio.run(...)
      - pattern-not: threading.Thread(...).run(...)
      - pattern-not: subprocess.run(...)
      - pattern-not: re.compile(...).run(...)
      # Suppressors deliberately do NOT include `import logging` or
      # `from logging import $Y` — most production code has stdlib logging
      # for error handling but no structured LLM audit trail. Suppressing
      # on plain `import logging` would silence the rule on essentially
      # every real codebase. Only structured-audit imports suppress.
      - pattern-not-inside: |
          import structlog
          ...
      - pattern-not-inside: |
          from langchain.callbacks import $Y
          ...
      - pattern-not-inside: |
          from langchain_core.callbacks import $Y
          ...
      - pattern-not-inside: |
          from langsmith import $Y
          ...
      - pattern-not-inside: |
          from opentelemetry import $Y
          ...
      - pattern-not-inside: |
          callbacks=$CB
          ...
    metadata:
      category: respond
      agentshield_id: AS-R-001
      severity_normalized: medium
      framework_mappings:
        owasp_llm: ["LLM10"]
        owasp_agentic: []
        nist_ai_rmf: ["MEASURE-2.7", "MANAGE-3.1"]
        mitre_atlas: []
        agentshield_v1: ["AS-R-001"]
      languages: [python]
      remediation: >-
        Add structured logging around every LLM/agent invocation. Capture: input
        prompt, retrieved documents, tool calls made, model output, latency, token
        counts. Recommended: LangSmith or OpenTelemetry traces with the LangChain
        OTEL integration. At minimum: standard `logging` with a dedicated
        `agent_audit` logger writing JSON.
      references:
        - "https://genai.owasp.org/llmrisk/llm10-unbounded-consumption/"
        - "https://docs.smith.langchain.com/"
