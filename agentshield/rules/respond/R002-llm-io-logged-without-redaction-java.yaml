rules:
  - id: agentshield.respond.llm-io-logged-without-redaction-java
    languages: [java]
    severity: INFO
    message: >-
      REVIEW-PER-DEPLOYMENT — LLM input or output flows into a Java log
      statement (SLF4J / Log4j / java.util.logging / System.out) with no
      redactor / hasher / length-only projection between source and sink.
      R001 encourages logging LLM calls for audit, but the natural
      implementation (`log.info("prompt={}", prompt)`) puts raw user-supplied
      content into the log stream. Logs are a high-value target and often
      replicated to less-protected destinations (SIEM, dev consoles, support
      tools, CI artifacts). OWASP LLM02 + LLM10. Verify your log destination's
      PII policy and the sensitivity of the LLM I/O before treating this as
      actionable. Java port of agentshield.respond.llm-io-logged-without-redaction
      (AS-R-002).
    mode: taint
    pattern-sources:
      - patterns:
          - pattern-either:
              # Spring MVC / WebFlux + JAX-RS user input — same source set
              # as D001 Java
              - patterns:
                  - pattern: $X
                  - pattern-inside: |
                      $RT $METHOD(..., @RequestParam $T $X, ...) { ... }
              - patterns:
                  - pattern: $X
                  - pattern-inside: |
                      $RT $METHOD(..., @RequestBody $T $X, ...) { ... }
              - patterns:
                  - pattern: $X
                  - pattern-inside: |
                      $RT $METHOD(..., @PathVariable $T $X, ...) { ... }
              - patterns:
                  - pattern: $X
                  - pattern-inside: |
                      $RT $METHOD(..., @QueryParam($K) $T $X, ...) { ... }
              # LLM call return values — same shape set as R001 Java
              - pattern: $RUNNER.run($AGENT, ...)
              - pattern: $RUNNER.runStream($AGENT, ...)
              - pattern: $RUNNER.runAsync($AGENT, ...)
              - pattern: $MODEL.generate(...)
              - pattern: $MODEL.chat(...)
              - pattern: $CHAIN.execute(...)
              - pattern: $ASSISTANT.chat(...)
              - pattern: $CLIENT.prompt().user(...).call(...)
              - pattern: $CLIENT.prompt(...).call(...)
              - pattern: $MODEL.call(new Prompt(...))
              - pattern: $MODEL.stream(new Prompt(...))
              - pattern: $CLIENT.invokeModel(...)
              - pattern: $CLIENT.invokeModelWithResponseStream(...)
              - pattern: $CLIENT.converse(...)
              - pattern: $CLIENT.converseStream(...)
              - pattern: $CLIENT.getChatCompletions(...)
              - pattern: $CLIENT.getCompletions(...)
              - pattern: $AGENT.invoke(...)
    pattern-sinks:
      - patterns:
          - pattern-either:
              # SLF4J — `log.info(format, args...)` / `log.debug(...)` / etc.
              - pattern: $LOGGER.trace(...)
              - pattern: $LOGGER.debug(...)
              - pattern: $LOGGER.info(...)
              - pattern: $LOGGER.warn(...)
              - pattern: $LOGGER.error(...)
              # java.util.logging — `logger.log(level, msg)` plus convenience methods
              - pattern: $LOGGER.log($LEVEL, ...)
              - pattern: $LOGGER.fine(...)
              - pattern: $LOGGER.finer(...)
              - pattern: $LOGGER.finest(...)
              - pattern: $LOGGER.config(...)
              - pattern: $LOGGER.severe(...)
              - pattern: $LOGGER.warning(...)
              # ad-hoc System.out / System.err
              - pattern: System.out.println(...)
              - pattern: System.out.print(...)
              - pattern: System.out.printf(...)
              - pattern: System.err.println(...)
              - pattern: System.err.print(...)
              - pattern: System.err.printf(...)
    pattern-sanitizers:
      - patterns:
          - pattern-either:
              # OWASP Java Encoder — partial redaction
              - pattern: org.owasp.encoder.Encode.forJava(...)
              - pattern: Encode.forJava(...)
              # In-house redactors / scrubbers — heuristic on method name
              - pattern: $X.redact(...)
              - pattern: $X.anonymize(...)
              - pattern: $X.mask(...)
              - pattern: $X.scrub(...)
              - pattern: $X.sanitize(...)
              - pattern: $X.sanitise(...)
              - pattern: $X.stripPii(...)
              # One-way hashing
              - pattern: MessageDigest.getInstance($ALGO).digest(...)
              - pattern: $DIGEST.digest(...)
              # Length-only projection
              - pattern: $X.length()
              - pattern: $X.size()
              # Lakera Guard equivalents reused as redactors
              - pattern: $G.detect(...)
              - pattern: $G.scan(...)
    metadata:
      category: respond
      agentshield_id: AS-R-002
      severity_normalized: info
      framework_mappings:
        owasp_llm: ["LLM02", "LLM10"]
        owasp_agentic: ["T8"]
        nist_ai_rmf: ["MEASURE-2.7", "MANAGE-2.4"]
        mitre_atlas: ["AML.T0024"]
        cwe: ["CWE-532", "CWE-200"]
        agentshield_v1: ["AS-R-002"]
      languages: [java]
      remediation: >-
        REVIEW-PER-DEPLOYMENT. Options ranked by safety: (1) log a one-way
        hash of the prompt / completion if you only need to correlate
        (`MessageDigest.getInstance("SHA-256").digest(prompt.getBytes())`) —
        searchable but unreadable. (2) Apply OWASP Encoder / a custom
        redactor that strips PII before the log call. (3) Log only the
        length / token count (`prompt.length()`, token-counter result) —
        zero content leak. (4) Log structured fields you control (a JSON
        object with role / message-id / model / latency) instead of raw
        message content. (5) Treat dev / debug-level logging as a separate
        decision from production logs.
      references:
        - "https://genai.owasp.org/llmrisk/llm02-sensitive-information-disclosure/"
        - "https://cwe.mitre.org/data/definitions/532.html"
