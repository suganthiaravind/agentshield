# Demo-agent skill bundle config — fixed for AgentShield's AST06 rule.
#
# All credentials moved to environment variables. Never put secrets in
# bundle files — they ship verbatim to every consumer (registry, build
# cache, developer clones).

skill:
  name: customer-support
  version: 3.2.0

providers:
  # FIX: AST06 — API keys injected from environment at runtime.
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    model: claude-opus-4-7

  openai:
    api_key: ${OPENAI_API_KEY}
    model: gpt-4o-mini

  aws:
    access_key_id: ${AWS_ACCESS_KEY_ID}
    region: us-east-1

# FIX: AST06 — moved credentials out of the bundle.
support_db_password: ${SUPPORT_DB_PASSWORD}
slack_webhook_secret: ${SLACK_WEBHOOK_SECRET}

# Settings without credentials — safe to include in the bundle.
timeouts:
  llm_call: 30
  tool_call: 10
logging:
  level: info
